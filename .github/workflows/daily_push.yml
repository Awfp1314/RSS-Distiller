name: Daily AI News Pusher

on:
  schedule:
    # 每天 UTC 时间 0:00 运行，相当于北京时间早上 8:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub Actions 网页端手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.10 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存 pip 依赖以加快后续运行速度

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行主执行脚本
      env:
        # 将你在 GitHub Repository Secrets 中配置的密钥映射为环境变量
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DISCORD_WEBHOOK_AI: ${{ secrets.DISCORD_WEBHOOK_AI }}
        DISCORD_WEBHOOK_UE: ${{ secrets.DISCORD_WEBHOOK_UE }}
        DISCORD_WEBHOOK_LEGAL: ${{ secrets.DISCORD_WEBHOOK_LEGAL }}
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      run: |
        python main.py
