name: Discord Changelog Notifier

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Post push summary to Discord changelog channel
        env:
          DISCORD_WEBHOOK_CHANGELOG: ${{ secrets.DISCORD_WEBHOOK_CHANGELOG }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          webhook = os.environ.get("DISCORD_WEBHOOK_CHANGELOG", "").strip()
          if not webhook:
              print("[skip] DISCORD_WEBHOOK_CHANGELOG is not configured.")
              raise SystemExit(0)
          if not webhook.startswith("https://discord.com/api/webhooks/"):
              print("[skip] DISCORD_WEBHOOK_CHANGELOG is not a valid Discord webhook URL.")
              raise SystemExit(0)

          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          actor = os.environ["GITHUB_ACTOR"]
          commits = event.get("commits", [])
          allowed_prefixes = ("feat:", "fix:", "perf:", "refactor:")
          filtered_commits = []
          for commit in commits:
              first_line = (commit.get("message", "").splitlines() or [""])[0].strip().lower()
              if first_line.startswith(allowed_prefixes):
                  filtered_commits.append(commit)

          if not filtered_commits:
              print("[skip] No feature/fix/perf/refactor commits in this push.")
              raise SystemExit(0)

          compare_url = event.get("compare", "")
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"

          lines = [
              "📢 **Project Update Bulletin**",
              "━━━━━━━━━━━━━━━━━━━━",
              f"🏷️ **Repo:** `{repo}`",
              f"🌿 **Branch:** `{branch}`",
              f"👤 **Author:** `{actor}`",
              f"✅ **Included Updates:** `{len(filtered_commits)}` (from `{len(commits)}` commits)",
              "",
          ]

          if filtered_commits:
              lines.append("🧩 **What's New**")
              for commit in filtered_commits[:10]:
                  sha = commit.get("id", "")[:7]
                  msg = (commit.get("message", "").splitlines() or ["(no message)"])[0]
                  lines.append(f"• `{sha}` {msg}")
              if len(filtered_commits) > 10:
                  lines.append(f"• ...and {len(filtered_commits) - 10} more matched updates")
          else:
              lines.append("No commit details were found in this push event.")

          if compare_url:
              lines.append("")
              lines.append(f"🔎 **Compare Changes:** {compare_url}")
          lines.append(f"📋 **Workflow Run:** {run_url}")
          lines.append("━━━━━━━━━━━━━━━━━━━━")

          content = "\n".join(lines)
          payload = json.dumps({"content": content}, ensure_ascii=False).encode("utf-8")

          req = urllib.request.Request(
              webhook,
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "rss-distiller-changelog-bot/1.0",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"Discord webhook response: {resp.status}")
          except urllib.error.HTTPError as e:
              error_body = ""
              try:
                  error_body = e.read().decode("utf-8", errors="ignore")
              except Exception:
                  error_body = "(failed to decode error body)"

              print(f"[warn] Discord webhook request failed: HTTP {e.code}")
              print(f"[warn] Response body: {error_body}")

              if e.code == 403:
                  print("[warn] 403 usually means the webhook URL is invalid, revoked, or lacks permission.")
                  print("[warn] Please regenerate the webhook in #changelog and update the DISCORD_WEBHOOK_CHANGELOG secret.")

              raise SystemExit(0)
          PY
